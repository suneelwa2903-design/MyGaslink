version: "3.9"

services:
  postgres:
    image: postgres:17-alpine
    container_name: gaslink-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: gaslink
      POSTGRES_PASSWORD: gaslink_dev
      POSTGRES_DB: gaslink
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gaslink"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
    driver: local
