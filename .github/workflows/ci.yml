name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
      # pnpm via corepack (reads pnpm@9.15.0 from package.json packageManager).
      # Avoids pnpm/action-setup, whose archives codeload.github.com fails to serve.
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      # @gaslink/shared exposes its types from dist/*.d.ts; build it first or
      # every package importing @gaslink/shared fails typecheck (TS2307 +
      # cascading implicit-any).
      - run: pnpm --filter @gaslink/shared build
      # Generate the Prisma client so api test files typecheck against real
      # model types (otherwise query results are `any` → TS7006 implicit-any).
      # No DB needed for `prisma generate`.
      - run: pnpm --filter @gaslink/api run db:generate
      # Typecheck per package — same exit-code-propagation reasoning as
      # the Lint step below (pnpm 9's `-r run` aggregates exits to 0 even
      # when one package fails). Bash `&&` chain ensures the first per-
      # package failure fails the job.
      - name: Typecheck
        run: |
          pnpm --filter @gaslink/shared run typecheck
          pnpm --filter @gaslink/api run typecheck
          pnpm --filter @gaslink/web run typecheck
          pnpm --filter @gaslink/mobile run typecheck
      # Lint per package with explicit exit-code propagation. The root
      # `pnpm -r run lint` returns exit 0 even when individual packages
      # fail (pnpm 9 aggregation quirk) — see CLAUDE.md anti-pattern
      # #21 sibling discussion. Calling each package separately means
      # ANY per-package failure fails the job. The check:tz step at the
      # end is the Phase D TZ-pattern guard.
      - name: Lint
        run: |
          pnpm --filter @gaslink/shared run lint
          pnpm --filter @gaslink/api run lint
          pnpm --filter @gaslink/web run lint
          pnpm --filter @gaslink/mobile run lint
          pnpm run check:tz

  test:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: gaslink
          POSTGRES_PASSWORD: gaslink_test
          POSTGRES_DB: gaslink_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://gaslink:gaslink_test@localhost:5432/gaslink_test
      JWT_ACCESS_SECRET: test-access-secret-minimum-32-characters
      JWT_REFRESH_SECRET: test-refresh-secret-minimum-32-characters
      NODE_ENV: test
      # seed.ts requireEnv-guards these WhiteBooks GSP creds. The test suite
      # mocks the WhiteBooks client, so placeholder values are sufficient to
      # seed the gst_credential rows without hitting any real API.
      WHITEBOOKS_EINVOICE_CLIENT_ID: test-einvoice-client-id
      WHITEBOOKS_EINVOICE_CLIENT_SECRET: test-einvoice-client-secret
      WHITEBOOKS_EINVOICE_USERNAME: test-einvoice-username
      WHITEBOOKS_EINVOICE_PASSWORD: test-einvoice-password
      WHITEBOOKS_EWAYBILL_CLIENT_ID: test-ewaybill-client-id
      WHITEBOOKS_EWAYBILL_CLIENT_SECRET: test-ewaybill-client-secret
      WHITEBOOKS_EWAYBILL_USERNAME: test-ewaybill-username
      WHITEBOOKS_EWAYBILL_PASSWORD: test-ewaybill-password
      # Group A revision: the test-connection / activation tests in
      # gst/gstActivation.test.ts make REAL HTTP calls to
      # apisandbox.whitebooks.in via previewTestConnection(). The Layer 1
      # env vars below carry the real sandbox credentials so those calls
      # actually authenticate in CI (same as locally). The 8 legacy
      # `WHITEBOOKS_*_(CLIENT|USERNAME|PASSWORD)` vars above stay because
      # seed.ts still requireEnv-guards them — those remain stub values.
      WHITEBOOKS_EINVOICE_SANDBOX_CLIENT_ID: ${{ secrets.WHITEBOOKS_EINVOICE_SANDBOX_CLIENT_ID }}
      WHITEBOOKS_EINVOICE_SANDBOX_CLIENT_SECRET: ${{ secrets.WHITEBOOKS_EINVOICE_SANDBOX_CLIENT_SECRET }}
      WHITEBOOKS_EINVOICE_SANDBOX_EMAIL: ${{ secrets.WHITEBOOKS_EINVOICE_SANDBOX_EMAIL }}
      WHITEBOOKS_EWAYBILL_SANDBOX_CLIENT_ID: ${{ secrets.WHITEBOOKS_EWAYBILL_SANDBOX_CLIENT_ID }}
      WHITEBOOKS_EWAYBILL_SANDBOX_CLIENT_SECRET: ${{ secrets.WHITEBOOKS_EWAYBILL_SANDBOX_CLIENT_SECRET }}
      WHITEBOOKS_EWAYBILL_SANDBOX_EMAIL: ${{ secrets.WHITEBOOKS_EWAYBILL_SANDBOX_EMAIL }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
      # pnpm via corepack (reads pnpm@9.15.0 from package.json packageManager).
      # Avoids pnpm/action-setup, whose archives codeload.github.com fails to serve.
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      # Build shared types before api tests resolve @gaslink/shared imports.
      - run: pnpm --filter @gaslink/shared build
      - run: pnpm --filter @gaslink/api run db:generate
      - run: pnpm --filter @gaslink/api run db:migrate
      - run: pnpm --filter @gaslink/api run db:seed
      - run: pnpm run test

  build:
    runs-on: ubuntu-latest
    needs: test
    # Vite reads `import.meta.env.VITE_API_URL` AT BUILD TIME and bakes it
    # into the bundle. Without it the web defaults to `/api` (same-origin),
    # so the deployed SPA POSTs to mygaslink.com/api/* — CloudFront falls
    # back to index.html → axios parses HTML as JSON → undefined response.
    env:
      VITE_API_URL: https://api.mygaslink.com/api
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
      # pnpm via corepack (reads pnpm@9.15.0 from package.json packageManager).
      # Avoids pnpm/action-setup, whose archives codeload.github.com fails to serve.
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      # api build (tsc) typechecks test files that use Prisma model types;
      # generate the client first or they fail with TS7006 implicit-any.
      - run: pnpm --filter @gaslink/api run db:generate
      - run: pnpm run build
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: packages/web/dist/
          retention-days: 7

  deploy-staging:
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: build
    environment: staging
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: packages/web/dist/

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'ap-south-1' }}

      - name: Deploy frontend to S3
        run: |
          aws s3 sync packages/web/dist/ s3://${{ vars.S3_BUCKET_STAGING }} --delete

      - name: Invalidate CloudFront cache
        if: vars.CLOUDFRONT_DIST_STAGING
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DIST_STAGING }} \
            --paths "/*"

      - name: Deploy backend to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST_STAGING }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /opt/gaslink
            git pull origin develop
            # Same self-healing wipe + NODE_ENV=development as the production
            # block below — see comments there for the rationale.
            rm -rf node_modules packages/api/node_modules packages/web/node_modules packages/mobile/node_modules packages/shared/node_modules
            NODE_ENV=development pnpm install --frozen-lockfile --config.confirmModulesPurge=false
            pnpm --filter @gaslink/api exec prisma generate
            pnpm --filter @gaslink/api run db:migrate:prod
            pnpm --filter @gaslink/shared build
            pnpm --filter @gaslink/api build
            pm2 restart gaslink-api || pm2 start packages/api/dist/server.js --name gaslink-api

  deploy-production:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: build
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: packages/web/dist/

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'ap-south-1' }}

      - name: Deploy frontend to S3
        run: |
          aws s3 sync packages/web/dist/ s3://${{ vars.S3_BUCKET_PRODUCTION }} --delete

      - name: Invalidate CloudFront cache
        if: vars.CLOUDFRONT_DIST_PRODUCTION
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DIST_PRODUCTION }} \
            --paths "/*"

      - name: Deploy backend to EC2
        uses: appleboy/ssh-action@v1
        env:
          # Group A Step 11 — inject WhiteBooks Layer 1 env vars (12 total: 3
          # fields × 2 scopes × 2 environments). The deploy step writes them
          # into /etc/environment alongside the existing DATABASE_URL/JWT vars
          # so PM2 picks them up via `source /etc/environment`. Live (PROD)
          # vars stay empty until the WhiteBooks production package is
          # purchased and Suneel populates the GH secrets — the API code
          # throws NO_PROD_CREDS on any live call when they're empty (safe).
          WHITEBOOKS_EINVOICE_SANDBOX_CLIENT_ID: ${{ secrets.WHITEBOOKS_EINVOICE_SANDBOX_CLIENT_ID }}
          WHITEBOOKS_EINVOICE_SANDBOX_CLIENT_SECRET: ${{ secrets.WHITEBOOKS_EINVOICE_SANDBOX_CLIENT_SECRET }}
          WHITEBOOKS_EINVOICE_SANDBOX_EMAIL: ${{ secrets.WHITEBOOKS_EINVOICE_SANDBOX_EMAIL }}
          WHITEBOOKS_EWAYBILL_SANDBOX_CLIENT_ID: ${{ secrets.WHITEBOOKS_EWAYBILL_SANDBOX_CLIENT_ID }}
          WHITEBOOKS_EWAYBILL_SANDBOX_CLIENT_SECRET: ${{ secrets.WHITEBOOKS_EWAYBILL_SANDBOX_CLIENT_SECRET }}
          WHITEBOOKS_EWAYBILL_SANDBOX_EMAIL: ${{ secrets.WHITEBOOKS_EWAYBILL_SANDBOX_EMAIL }}
          WHITEBOOKS_EINVOICE_PROD_CLIENT_ID: ${{ secrets.WHITEBOOKS_EINVOICE_PROD_CLIENT_ID }}
          WHITEBOOKS_EINVOICE_PROD_CLIENT_SECRET: ${{ secrets.WHITEBOOKS_EINVOICE_PROD_CLIENT_SECRET }}
          WHITEBOOKS_EINVOICE_PROD_EMAIL: ${{ secrets.WHITEBOOKS_EINVOICE_PROD_EMAIL }}
          WHITEBOOKS_EWAYBILL_PROD_CLIENT_ID: ${{ secrets.WHITEBOOKS_EWAYBILL_PROD_CLIENT_ID }}
          WHITEBOOKS_EWAYBILL_PROD_CLIENT_SECRET: ${{ secrets.WHITEBOOKS_EWAYBILL_PROD_CLIENT_SECRET }}
          WHITEBOOKS_EWAYBILL_PROD_EMAIL: ${{ secrets.WHITEBOOKS_EWAYBILL_PROD_EMAIL }}
          # Group B Part 2 — SMTP credentials for outbound mail (welcome
          # email, OTP, contact form). Gmail Workspace on info@mygaslink.com;
          # SMTP_PASS is a Google app password held only as a GH secret.
          # If SMTP_PASS is empty the API still boots and POST /api/users
          # still succeeds — the welcome email is logged as 'skipped' in
          # email_logs and the admin falls back to the in-UI copyable banner.
          # WEB_APP_URL is the login URL embedded in the welcome email body.
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_FROM_NAME: ${{ secrets.SMTP_FROM_NAME }}
          WEB_APP_URL: ${{ secrets.WEB_APP_URL }}
        with:
          host: ${{ secrets.EC2_HOST_PRODUCTION }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: WHITEBOOKS_EINVOICE_SANDBOX_CLIENT_ID,WHITEBOOKS_EINVOICE_SANDBOX_CLIENT_SECRET,WHITEBOOKS_EINVOICE_SANDBOX_EMAIL,WHITEBOOKS_EWAYBILL_SANDBOX_CLIENT_ID,WHITEBOOKS_EWAYBILL_SANDBOX_CLIENT_SECRET,WHITEBOOKS_EWAYBILL_SANDBOX_EMAIL,WHITEBOOKS_EINVOICE_PROD_CLIENT_ID,WHITEBOOKS_EINVOICE_PROD_CLIENT_SECRET,WHITEBOOKS_EINVOICE_PROD_EMAIL,WHITEBOOKS_EWAYBILL_PROD_CLIENT_ID,WHITEBOOKS_EWAYBILL_PROD_CLIENT_SECRET,WHITEBOOKS_EWAYBILL_PROD_EMAIL,SMTP_HOST,SMTP_PORT,SMTP_USER,SMTP_PASS,SMTP_FROM,SMTP_FROM_NAME,WEB_APP_URL
          script: |
            set -e
            set -o pipefail
            cd /opt/gaslink
            # Auth inline (server's remote is tokenless; PAT lives only in
            # this CI step's memory, never persisted on disk).
            git pull https://x-access-token:${{ secrets.GH_PAT }}@github.com/suneelwa2903-design/MyGaslink.git main
            # appleboy/ssh-action runs commands without a pty. Under pnpm 9,
            # if node_modules has drifted (e.g. a transitive that landed in
            # the lockfile but wasn't installed last time), `pnpm install`
            # surfaces an interactive "remove and reinstall? (Y/n)" prompt.
            # In a non-pty session that prompt auto-resolves to "true" but
            # the actual reinstall has historically been left in a half-
            # written state — the most visible symptom was the EC2 tsc
            # erroring with `Cannot find module 'razorpay'` even though the
            # package was in the lockfile (CI runs 27392542918, 27392376912,
            # 27410236601). Wiping node_modules before install forces a
            # deterministic clean install every deploy. ~30s slower; worth it
            # for the self-healing property.
            rm -rf node_modules packages/api/node_modules packages/web/node_modules packages/mobile/node_modules packages/shared/node_modules
            # NODE_ENV=production is set in the EC2 shell (used at runtime by
            # the api). Under that, `pnpm install` skips devDependencies — so
            # @types/express, @types/jsonwebtoken, etc. never land on disk
            # and the next `tsc` build fails with TS7016 across every typed
            # import (proven by CI run 27410917268 after the wipe started
            # working). Forcing NODE_ENV=development scoped to the install
            # ensures dev deps install; the env reverts immediately after.
            # `--config.confirmModulesPurge=false` belt-and-braces: even if
            # the wipe above is interrupted, this flag prevents the non-pty
            # interactive prompt that historically left things in a half-
            # written state.
            NODE_ENV=development pnpm install --frozen-lockfile --config.confirmModulesPurge=false
            # `prisma generate` must run after install (it writes into the
            # freshly-installed @prisma/client) AND before any tsc build that
            # imports `Prisma` / `$Enums` from @prisma/client. Explicit `exec`
            # call (vs the wrapper script) avoids any indirection.
            pnpm --filter @gaslink/api exec prisma generate
            pnpm --filter @gaslink/api run db:migrate:prod
            # api build (tsc) consumes @gaslink/shared dist; rebuild on every
            # deploy so stale source can't ship stale types.
            pnpm --filter @gaslink/shared build
            pnpm --filter @gaslink/api build
            # Group A Step 11 — write the WhiteBooks Layer 1 env vars into
            # /etc/environment so they survive PM2 restarts AND systemd
            # resurrect on reboot. Idempotent: each line is replaced if the
            # key already exists, appended otherwise. sudo NOT needed —
            # ec2-user owns /etc/environment in this AMI.
            for var in WHITEBOOKS_EINVOICE_SANDBOX_CLIENT_ID WHITEBOOKS_EINVOICE_SANDBOX_CLIENT_SECRET WHITEBOOKS_EINVOICE_SANDBOX_EMAIL WHITEBOOKS_EWAYBILL_SANDBOX_CLIENT_ID WHITEBOOKS_EWAYBILL_SANDBOX_CLIENT_SECRET WHITEBOOKS_EWAYBILL_SANDBOX_EMAIL WHITEBOOKS_EINVOICE_PROD_CLIENT_ID WHITEBOOKS_EINVOICE_PROD_CLIENT_SECRET WHITEBOOKS_EINVOICE_PROD_EMAIL WHITEBOOKS_EWAYBILL_PROD_CLIENT_ID WHITEBOOKS_EWAYBILL_PROD_CLIENT_SECRET WHITEBOOKS_EWAYBILL_PROD_EMAIL SMTP_HOST SMTP_PORT SMTP_USER SMTP_PASS SMTP_FROM SMTP_FROM_NAME WEB_APP_URL; do
              val="${!var:-}"
              # Skip writing PROD vars while they're empty (don't clobber any
              # value that Suneel may have set manually on the box).
              if [ -z "$val" ]; then continue; fi
              # Remove any existing line for this key, then append the new one.
              sudo sed -i "/^${var}=/d" /etc/environment
              echo "${var}=${val}" | sudo tee -a /etc/environment > /dev/null
            done
            # PM2 --update-env replaces the process env with the current shell
            # env, so we must source /etc/environment first or DATABASE_URL,
            # JWT_*, CORS_ORIGINS would be wiped and the api would crash.
            set -a; source /etc/environment; set +a
            pm2 restart gaslink-api --update-env || pm2 start packages/api/dist/server.js --name gaslink-api

  backup:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: deploy-production
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Run database backup
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST_PRODUCTION }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /opt/gaslink
            DATABASE_URL="${{ secrets.DATABASE_URL }}" bash scripts/backup.sh /opt/gaslink/backups

      - name: Upload backup to S3
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST_PRODUCTION }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            LATEST=$(ls -t /opt/gaslink/backups/gaslink_*.sql.gz | head -1)
            aws s3 cp "$LATEST" s3://${{ vars.S3_BACKUP_BUCKET }}/db-backups/
